<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Profil – DzzStore</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#050a14;--bg2:#0a1628;--bg3:#0f1f3d;--blue:#1e90ff;--blue2:#0d6efd;--blue-glow:#1e90ff55;--blue-light:#60b4ff;--accent:#00d4ff;--text:#e8f0ff;--text2:#8ba8d4;--border:#1a3258;--nav-h:70px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:calc(var(--nav-h)+16px);}
.bg-deco{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-deco span{position:absolute;border:1px solid rgba(30,144,255,.18);border-radius:6px;background:rgba(30,144,255,.03);}
.bg-deco span:nth-child(1){width:40px;height:40px;top:8%;left:6%;transform:rotate(15deg);}
.bg-deco span:nth-child(2){width:22px;height:22px;top:18%;right:10%;animation:bgf1 6s ease-in-out infinite;}
.bg-deco span:nth-child(3){width:60px;height:60px;top:35%;left:3%;animation:bgf2 8s ease-in-out infinite;border-color:rgba(0,212,255,.12);}
.bg-deco span:nth-child(4){width:16px;height:16px;top:50%;right:7%;animation:bgf1 5s ease-in-out infinite 1s;}
.bg-deco span:nth-child(5){width:32px;height:32px;top:65%;left:12%;animation:bgf2 7s ease-in-out infinite .5s;border-color:rgba(0,212,255,.15);}
.bg-deco span:nth-child(6){width:48px;height:48px;top:78%;right:5%;animation:bgf1 9s ease-in-out infinite 2s;}
.bg-deco span:nth-child(7){width:18px;height:18px;top:88%;left:40%;animation:bgf2 6s ease-in-out infinite 1.5s;}
.bg-deco span:nth-child(8){width:28px;height:28px;top:12%;left:55%;animation:bgf1 7s ease-in-out infinite 3s;border-color:rgba(0,212,255,.1);}
@keyframes bgf1{0%,100%{transform:rotate(15deg) translateY(0);}50%{transform:rotate(15deg) translateY(-10px);}}
@keyframes bgf2{0%,100%{transform:rotate(8deg) translateY(0);}50%{transform:rotate(8deg) translateY(8px);}}





#overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:900;opacity:0;pointer-events:none;transition:opacity .3s;}
#overlay.show{opacity:1;pointer-events:all;}
#sidebar{position:fixed;top:0;left:-280px;bottom:0;width:280px;background:var(--bg2);border-right:1px solid var(--border);z-index:950;transition:left .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden;}
#sidebar.open{left:0;}
.sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,var(--bg3),var(--bg2));}
.sidebar-logo{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;background:linear-gradient(90deg,var(--blue),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sidebar-tagline{font-size:11px;color:var(--text2);margin-top:2px;letter-spacing:1px;}
.sidebar-menu{flex:1;padding:16px 0;overflow-y:auto;}
.sidebar-item{display:flex;align-items:center;gap:14px;padding:14px 24px;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent;}
.sidebar-item:hover,.sidebar-item.active{background:var(--bg3);color:var(--blue-light);border-left-color:var(--blue);}
.sidebar-section{padding:8px 24px 4px;font-size:10px;font-weight:700;color:var(--text2);letter-spacing:1.5px;text-transform:uppercase;}
.sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:12px;color:var(--text2);}
.g-topbar{position:sticky;top:0;z-index:400;padding:10px 16px;background:var(--bg);}
.g-topbar-inner{background:var(--bg2);border:1px solid var(--border);border-radius:18px;height:52px;display:flex;align-items:center;padding:0 14px;gap:12px;box-shadow:0 4px 24px rgba(0,0,0,.4);}
.hamburger-btn{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:4px;flex-shrink:0;background:none;border:none;}
.hamburger-btn span{display:block;height:2px;border-radius:2px;background:var(--text2);}
.hamburger-btn span:nth-child(1){width:20px;}
.hamburger-btn span:nth-child(2){width:14px;}
.hamburger-btn span:nth-child(3){width:17px;}
.g-topbar-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:var(--text);flex:1;}
.g-topbar-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.bell-btn{cursor:pointer;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
@keyframes bellSwing{0%,100%{transform:rotate(0);}10%{transform:rotate(14deg);}30%{transform:rotate(-12deg);}50%{transform:rotate(10deg);}70%{transform:rotate(-8deg);}85%{transform:rotate(5deg);}}
.bell-btn svg{animation:bellSwing 3s ease-in-out infinite;transform-origin:top center;}
.avatar-wrap{position:relative;}
.avatar-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--bg3),var(--border));border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:border-color .2s;}
.avatar-circle:hover{border-color:var(--blue);}
.avatar-drop{position:absolute;top:calc(100% + 10px);right:0;min-width:170px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-8px) scale(.96);transition:all .2s cubic-bezier(.34,1.56,.64,1);z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.5);}
.avatar-drop.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1);}
.avatar-drop-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);font-size:11px;color:var(--text2);}
.avatar-drop-header strong{display:block;font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);margin-bottom:2px;}
.avatar-drop a{display:flex;align-items:center;gap:10px;padding:12px 16px;font-size:13px;color:var(--text2);text-decoration:none;cursor:pointer;transition:all .15s;}
.avatar-drop a:hover{background:var(--bg3);color:var(--text);}
.avatar-drop a.danger{color:#ff6b6b;}

.page-wrap{max-width:680px;margin:0 auto;padding:0 20px 40px;position:relative;z-index:1;}

/* GUEST */
.guest-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;padding:40px 20px;}
.guest-icon{font-size:56px;margin-bottom:16px;opacity:.4;}
.guest-title{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;color:var(--text2);margin-bottom:6px;}
.guest-sub{font-size:13px;color:var(--text2);opacity:.6;margin-bottom:28px;}
.guest-btns{display:flex;gap:12px;}
.guest-btn-login{padding:12px 28px;background:var(--blue);border:2px solid #000;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;text-decoration:none;}
.guest-btn-register{padding:12px 28px;background:#000;border:2px solid var(--blue);border-radius:12px;color:var(--blue);font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;text-decoration:none;}

/* PROFILE CARD - same bg as accordion, no banner */
.profile-hero{margin-top:16px;border-radius:20px;background:var(--bg2);border:1px solid var(--border);padding:24px 20px 20px;}
.profile-avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:18px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text2);}
.profile-name{font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;text-align:center;}

/* STATS — 3 kotak */
.stats-row{display:flex;gap:10px;}
.stat-box{flex:1;border-radius:14px;padding:14px 10px;text-align:center;border:1px solid;}
.stat-box.kuning{background:rgba(255,180,0,.08);border-color:rgba(255,180,0,.25);}
.stat-box.hijau {background:rgba(0,200,100,.08);border-color:rgba(0,200,100,.25);}
.stat-box.merah {background:rgba(255,80,80,.08); border-color:rgba(255,80,80,.25);}
.stat-num{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800;line-height:1;}
.stat-box.kuning .stat-num{color:#ffb300;}
.stat-box.hijau  .stat-num{color:#00c864;}
.stat-box.merah  .stat-num{color:#ff5050;}
.stat-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.stat-box.kuning .stat-label{color:#ffb300;}
.stat-box.hijau  .stat-label{color:#00c864;}
.stat-box.merah  .stat-label{color:#ff5050;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:2px;}

/* ACCORDION */
.acc{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:10px;overflow:hidden;}
.acc-header{display:flex;align-items:center;gap:12px;padding:16px 18px;cursor:pointer;transition:background .2s;user-select:none;}
.acc-header:hover{background:var(--bg3);}
.acc-icon{width:36px;height:36px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.acc-title{flex:1;font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;}
.acc-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.acc-chevron{transition:transform .3s;color:var(--text2);flex-shrink:0;}
.acc.open .acc-chevron{transform:rotate(180deg);}
.acc-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
.acc.open .acc-body{max-height:800px;}
.acc-content{padding:0 18px 18px;border-top:1px solid var(--border);}

/* Ganti Password */
.pw-field{margin-top:14px;}
.pw-label{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:6px;}
.pw-wrap{position:relative;}
.pw-input{width:100%;padding:12px 40px 12px 14px;background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.pw-input:focus{border-color:var(--blue);}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;padding:2px;display:flex;align-items:center;}
.pw-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--accent));border:none;border-radius:12px;color:#000;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;cursor:pointer;margin-top:14px;transition:all .2s;}
.pw-btn:hover{transform:translateY(-1px);}

/* Kelola User */
.user-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.user-item:last-child{border-bottom:none;}
.user-avatar-sm{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--blue2),var(--accent));display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:#000;flex-shrink:0;}
.user-info{flex:1;}
.user-name-sm{font-size:13px;font-weight:700;}
.user-email-sm{font-size:10px;color:var(--text2);margin-top:1px;}
.user-empty{padding:20px 0;text-align:center;color:var(--text2);font-size:13px;opacity:.6;}

/* Product order cards - 4 warna beda */
.prod-card{border-radius:12px;padding:14px;margin-top:10px;border:1px solid;}
.prod-card.ptero {background:rgba(124,85,255,.08);border-color:rgba(124,85,255,.3);}
.prod-card.pulsa {background:rgba(30,144,255,.08);border-color:rgba(30,144,255,.3);}
.prod-card.data  {background:rgba(0,200,150,.08);border-color:rgba(0,200,150,.3);}
.prod-card.follo {background:rgba(255,100,150,.08);border-color:rgba(255,100,150,.3);}
.prod-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.prod-card-name{font-family:'Outfit',sans-serif;font-size:14px;font-weight:800;}
.prod-card.ptero .prod-card-name{color:#a78bfa;}
.prod-card.pulsa .prod-card-name{color:#60b4ff;}
.prod-card.data  .prod-card-name{color:#00c896;}
.prod-card.follo .prod-card-name{color:#ff64a0;}
.order-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
.order-badge.aktif  {background:rgba(0,200,100,.12);color:#00c864;border:1px solid rgba(0,200,100,.25);}
.order-badge.expired{background:rgba(255,80,80,.08);color:#ff5050;border:1px solid rgba(255,80,80,.2);}
.order-badge.pending{background:rgba(255,180,0,.1);color:#ffb300;border:1px solid rgba(255,180,0,.25);}
.order-meta{display:flex;gap:14px;flex-wrap:wrap;}
.order-meta-item{font-size:11px;color:var(--text2);}
.order-meta-item strong{color:var(--text);}
.order-empty{padding:20px 0;text-align:center;color:var(--text2);font-size:13px;opacity:.6;}

/* Logout */
.logout-btn{width:100%;padding:14px;background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:12px;color:#ff6b6b;font-family:'Outfit',sans-serif;font-weight:800;font-size:14px;cursor:pointer;transition:all .2s;margin-top:4px;}
.logout-btn:hover{background:rgba(255,80,80,.15);}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;z-index:800;backdrop-filter:blur(10px);padding:0 4px;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;padding:8px 4px;position:relative;}
.nav-item .nav-icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text2);}
.nav-item .nav-label{font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.nav-item.active .nav-icon{color:var(--blue);}
.nav-item.active .nav-label{color:var(--blue-light);}
.nav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:2.5px;background:linear-gradient(90deg,var(--blue),var(--accent));border-radius:0 0 4px 4px;}
.nav-fab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;position:relative;}
.fab-circle{width:52px;height:52px;background:linear-gradient(135deg,var(--blue2),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--blue-glow);transition:all .2s;margin-top:-22px;border:3px solid var(--bg2);}
.nav-fab .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-top:-2px;color:var(--blue-light);}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.avatar-drop-header span{font-size:11px;color:var(--text2);display:block;}.avatar-drop-divider{height:1px;background:var(--border);margin:4px 0;}
</style>
</head>

          </div>

  <div class="nav-item" onclick="location.href='/riwayat'"><div class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><span class="nav-label">Riwayat</span></div>

<script>
function getUser(){try{return JSON.parse(localStorage.getItem('dzz_user'));}catch{return null;}}
function doLogout(){localStorage.removeItem('dzz_user');location.href='/';}
function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('show');}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('show');}
function toggleAvatarDrop(e){e.stopPropagation();document.getElementById('avatar-drop').classList.toggle('open');}
document.addEventListener('click',()=>document.getElementById('avatar-drop').classList.remove('open'));

function toggleAcc(id){document.getElementById(id).classList.toggle('open');}

function togglePw(id,btn){
  var inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
  var line=btn.querySelector('line');
  if(line) line.style.opacity=inp.type==='password'?'1':'0';
}

function prodClass(pkg){
  if(!pkg) return 'ptero';
  var p=pkg.toLowerCase();
  if(p.indexOf('pulsa')>-1) return 'pulsa';
  if(p.indexOf('data')>-1||p.indexOf('paket')>-1) return 'data';
  if(p.indexOf('follow')>-1||p.indexOf('suntik')>-1) return 'follo';
  return 'ptero';
}
function prodName(pkg){
  if(!pkg) return 'Panel Pterodactyl';
  var p=pkg.toLowerCase();
  if(p.indexOf('pulsa')>-1) return 'Pulsa & Operator';
  if(p.indexOf('data')>-1||p.indexOf('paket')>-1) return 'Paket Internet';
  if(p.indexOf('follow')>-1||p.indexOf('suntik')>-1) return 'Suntik Follower';
  return 'Panel Pterodactyl';
}

function gantiPassword(){
  var oldPw=document.getElementById('pw-old').value;
  var newPw=document.getElementById('pw-new').value;
  var newPw2=document.getElementById('pw-new2').value;
  var msg=document.getElementById('pw-msg');
  msg.style.display='block';
  if(!oldPw||!newPw||!newPw2){msg.style.color='#ff6b6b';msg.textContent='Semua field wajib diisi';return;}
  if(newPw.length<8){msg.style.color='#ff6b6b';msg.textContent='Password baru minimal 8 karakter';return;}
  if(newPw!==newPw2){msg.style.color='#ff6b6b';msg.textContent='Password baru tidak cocok';return;}
  msg.style.color='#00c864';msg.textContent='✓ Password berhasil diubah';
}

var CHEV='<svg class="acc-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>';
var EYE='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="3" y1="3" x2="21" y2="21" stroke-width="2"/></svg>';

function renderContent(){
  var el=document.getElementById('content');
  if(!el) return;
  var user=getUser();

  if(!user){
    el.innerHTML='<div class="guest-state"><div class="guest-icon">👤</div><div class="guest-title">Anda belum login</div><div class="guest-sub">Silakan login untuk melihat profil kamu</div><div class="guest-btns"><a href="/register" class="guest-btn-register">Register</a><a href="/login" class="guest-btn-login">Login</a></div></div>';
    return;
  }

  var orders=JSON.parse(localStorage.getItem('dzz_orders_'+user.id)||'[]');
  var panelUsers=JSON.parse(localStorage.getItem('panel_users')||'[]');
  var pending=orders.filter(function(o){return o.status==='pending';}).length;
  var sukses=orders.filter(function(o){return o.status==='aktif';}).length;
  var batal=orders.filter(function(o){return o.status==='expired'||o.status==='batal';}).length;

  var userListHTML=panelUsers.length===0
    ?'<div class="user-empty">Belum ada user panel</div>'
    :panelUsers.map(function(u){
      return '<div class="user-item"><div class="user-avatar-sm">'+u.username.slice(0,2).toUpperCase()+'</div><div class="user-info"><div class="user-name-sm">'+u.username+'</div><div class="user-email-sm">'+u.email+'</div></div></div>';
    }).join('');

  var orderListHTML=orders.length===0
    ?'<div class="order-empty">📭 Belum ada order</div>'
    :orders.slice().reverse().map(function(o){
      var cls=prodClass(o.pkg);
      var nm=prodName(o.pkg);
      var badge=o.status==='aktif'?'Aktif':o.status==='pending'?'Pending':'Expired';
      var tgl=o.created?new Date(o.created).toLocaleDateString('id-ID'):'-';
      return '<div class="prod-card '+cls+'"><div class="prod-card-top"><div class="prod-card-name">'+nm+'</div><div class="order-badge '+o.status+'">'+badge+'</div></div><div class="order-meta"><div class="order-meta-item">Paket: <strong>'+(o.pkg||'-')+'</strong></div><div class="order-meta-item">User: <strong>'+(o.user||'-')+'</strong></div><div class="order-meta-item">Harga: <strong>'+(o.price||'-')+'</strong></div><div class="order-meta-item">Tanggal: <strong>'+tgl+'</strong></div></div></div>';
    }).join('');

  el.innerHTML=
  '<div class="profile-hero">'+
    '<div class="profile-avatar-wrap">'+
      '<div class="profile-avatar"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>'+
      '<div class="profile-name">'+user.username+'</div>'+
    '</div>'+
    '<div class="stats-row">'+
      '<div class="stat-box kuning"><div class="stat-num">'+pending+'</div><div class="stat-label">Transaksi</div><div class="stat-sub">Pending</div></div>'+
      '<div class="stat-box hijau"><div class="stat-num">'+sukses+'</div><div class="stat-label">Transaksi</div><div class="stat-sub">Sukses</div></div>'+
      '<div class="stat-box merah"><div class="stat-num">'+batal+'</div><div class="stat-label">Transaksi</div><div class="stat-sub">Batal</div></div>'+
    '</div>'+
  '</div>'+
  '<div style="height:10px"></div>'+

  // Accordion Ganti Password
  '<div class="acc" id="acc-pw">'+
    '<div class="acc-header" onclick="toggleAcc(\'acc-pw\')">'+
      '<div class="acc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--blue)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>'+
      '<div style="flex:1"><div class="acc-title">Ganti Password</div><div class="acc-sub">Ubah password akun DzzStore</div></div>'+
      CHEV+
    '</div>'+
    '<div class="acc-body"><div class="acc-content">'+
      '<div class="pw-field"><label class="pw-label">Password Lama</label><div class="pw-wrap"><input class="pw-input" type="password" id="pw-old" placeholder="••••••••"><button class="pw-eye" type="button" onclick="togglePw(\'pw-old\',this)">'+EYE+'</button></div></div>'+
      '<div class="pw-field"><label class="pw-label">Password Baru</label><div class="pw-wrap"><input class="pw-input" type="password" id="pw-new" placeholder="••••••••"><button class="pw-eye" type="button" onclick="togglePw(\'pw-new\',this)">'+EYE+'</button></div></div>'+
      '<div class="pw-field"><label class="pw-label">Tulis Ulang Password Baru</label><div class="pw-wrap"><input class="pw-input" type="password" id="pw-new2" placeholder="••••••••"><button class="pw-eye" type="button" onclick="togglePw(\'pw-new2\',this)">'+EYE+'</button></div></div>'+
      '<button class="pw-btn" onclick="gantiPassword()">Simpan Password</button>'+
      '<div id="pw-msg" style="margin-top:8px;font-size:12px;text-align:center;display:none"></div>'+
    '</div></div>'+
  '</div>'+

  // Accordion Kelola User
  '<div class="acc" id="acc-user">'+
    '<div class="acc-header" onclick="toggleAcc(\'acc-user\')">'+
      '<div class="acc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>'+
      '<div style="flex:1"><div class="acc-title">Kelola User</div><div class="acc-sub">'+panelUsers.length+' user panel terdaftar</div></div>'+
      CHEV+
    '</div>'+
    '<div class="acc-body"><div class="acc-content">'+
      '<a href="/buat-user" style="display:flex;align-items:center;gap:8px;padding:10px 0;color:var(--accent);font-size:13px;font-weight:700;text-decoration:none;margin-bottom:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>Buat User Panel Baru</a>'+
      userListHTML+
    '</div></div>'+
  '</div>'+

  // Accordion Riwayat Order
  '<div class="acc" id="acc-order">'+
    '<div class="acc-header" onclick="toggleAcc(\'acc-order\')">'+
      '<div class="acc-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffb300" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>'+
      '<div style="flex:1"><div class="acc-title">Riwayat Order</div><div class="acc-sub">'+orders.length+' order</div></div>'+
      CHEV+
    '</div>'+
    '<div class="acc-body"><div class="acc-content">'+orderListHTML+'</div></div>'+
  '</div>'+

  '<button class="logout-btn" onclick="doLogout()">🚪 Keluar dari Akun</button>';
}

// Init topbar dan render
(function(){
  var user=getUser();
  if(user){
    var dg=document.getElementById('drop-guest');
    var du=document.getElementById('drop-user');
    var dn=document.getElementById('drop-uname');
    if(dg) dg.style.display='none';
    if(du) du.style.display='block';
    if(dn) dn.textContent=user.username;
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded',renderContent);
  } else {
    renderContent();
  }
})();
</script>
</body>
</html>
